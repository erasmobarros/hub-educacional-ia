name: Integração Contínua (CI)

# Roda quando você faz Push na branch main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Baixa seu código
    - uses: actions/checkout@v3

    # 2. Instala o Python
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    # 3. Instala as dependências
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Roda o Linter (Verifica erros de estilo)
    - name: Lint with flake8
      run: |
        # Para o build se houver erros de sintaxe ou nomes indefinidos
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Apenas avisa sobre estilo (linhas muito longas, etc)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics